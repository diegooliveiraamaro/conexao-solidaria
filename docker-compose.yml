services:

  postgres:
    image: postgres:16
    container_name: conexao-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: conexao_solidaria

    ports:
      - "5433:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: conexao-rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"