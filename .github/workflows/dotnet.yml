name: CI-CD

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal

    - name: Build API Docker Image
      run: docker build -t conexao-solidaria-api -f services/ConexaoSolidaria.Api/Dockerfile .

    - name: Build Worker Docker Image
      run: docker build -t conexao-solidaria-worker -f services/ConexaoSolidaria.Worker/Dockerfile .